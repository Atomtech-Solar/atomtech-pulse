<!doctype html>
<html lang="pt-BR">
  <head>
    <script>
      (function() {
        var theme = localStorage.getItem('luma_gen_theme') || localStorage.getItem('topup_theme');
        if (theme === 'light') document.documentElement.classList.remove('dark');
        else if (theme === 'dark' || !theme) document.documentElement.classList.add('dark');
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luma Gen – Gestão de Carregadores</title>
    <meta name="description" content="Luma Generation — gestão de rede de carregadores veiculares elétricos" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
